syntax = "proto3";
package api.social.v1;
option go_package = "social/v1;socialv1";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service SocialService {

//  rpc Register(RegisterRequest) returns (RegisterResponse);
//  rpc Login(LoginRequest) returns (LoginResponse);
//  rpc Me(google.protobuf.Empty) returns (MeResponse);
//  rpc Refresh(RefreshRequest) returns (RefreshResponse);
//  rpc Logout(google.protobuf.Empty) returns (google.protobuf.Empty);

  rpc CreateUser(CreateUserRequest) returns (User);
  rpc GetUser(GetUserRequest) returns (User);
  rpc UpdateUser(UpdateUserRequest) returns (User);

  rpc CreateProfile(CreateProfileRequest) returns (UserProfile);
  rpc GetProfile(GetProfileRequest) returns (UserProfile);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserProfile);
}

message User {
  string id = 1;
  string email = 2;
  string password_hash = 3;
  string role = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  UserProfile profile = 7;
}

message UserProfile {
  string user_id = 1;
  string name = 2;
  string surname = 3;
  string username = 4;
  string profile_photo_url = 5;
  string bio = 6;
  string address = 7;
  string birth_date = 8;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
}

message UpdateUserRequest {
  optional string email = 1;
  optional string role = 2;
}

message CreateProfileRequest {
  string name = 1;
  string surname = 2;
  string username = 3;
  optional string profile_photo_url = 4;
  optional string bio = 5;
  optional string address = 6;
  optional string birth_date = 7;
}

message UpdateProfileRequest {
  optional string name = 1;
  optional string surname = 2;
  optional string username = 3;
  optional string profile_photo_url = 4;
  optional string bio = 5;
  optional string address = 6;
  optional string birth_date = 7;
}

message GetUserRequest { string user_id = 1; }
message GetProfileRequest { string user_id = 1; }  // по user_id!

message LoginRequest { string email = 1; string password = 2; }
message LoginResponse {
  AuthTokens tokens = 1;
  User user = 2;
}

message AuthTokens {
  string access_token = 1;
  string refresh_token = 2;
  int32 access_expires_in = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}
