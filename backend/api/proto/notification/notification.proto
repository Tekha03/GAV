syntax = "proto3";

package api.social_network.v3;
option go_package = ".;v3";

message NotificationRequest {
  bytes user_id = 1;
  string title = 2;
  string body = 3;
  string event_type = 4; // "new_message", "like", "follow", ...
  map<string, string> data = 5; // chat_id, sender_id и т.п.
}

message NotificationResponse {
  bool success = 1;
  string error = 2;
}

service NotificationService {
  rpc SendNotification(NotificationRequest) returns (NotificationResponse);
}
