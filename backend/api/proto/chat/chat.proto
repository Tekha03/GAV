syntax = "proto3";
package api.chat.v1;
option go_package = ".;v1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto"; 

service ChatService {
  rpc CreatePrivateChat(CreatePrivateChatRequest) returns (CreatePrivateChatResponse) {
    option (google.api.http) = {
      post: "/v1/chats/private"
      body: "*"
    };
  }
  rpc CreateGroupChat(CreateGroupChatRequest) returns (CreateGroupChatResponse) {
    option (google.api.http) = {
      post: "/v1/chats/group"
      body: "*"
    };
  }
  rpc GetChat(GetChatRequest) returns (GetChatResponse) {
    option (google.api.http) = {
      get: "/v1/chats/{chat_id}"
    };
  }
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse) {
    option (google.api.http) = {
      post: "/v1/chats/{chat_id}/members"
      body: "*"
      additional_bindings {
        post: "/v1/chats/{chat_id}/members/{user_id}"
        body: "*"
      }
    };
  }
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse) {
    option (google.api.http) = {
      post: "/v1/chats/{chat_id}/messages"
      body: "*"
    };
  }
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse) {
    option (google.api.http) = {
      get: "/v1/chats/{chat_id}/messages"
      additional_bindings {
        get: "/v1/chats/{chat_id}/messages/{cursor_id}"
      }
    };
  }
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse) {
    option (google.api.http) = {
      patch: "/v1/messages/{message_id}"
      body: "*"
    };
  }
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse) {
    option (google.api.http) = {
      delete: "/v1/messages/{message_id}"
    };
  }
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse) {
    option (google.api.http) = {
      post: "/v1/chats/{chat_id}/read"
      body: "*"
    };
  }
  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse) {
    option (google.api.http) = {
      post: "/v1/chats/{chat_id}/pin/{message_id}"
    };
  }
  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse) {
    option (google.api.http) = {
      post: "/v1/messages/{message_id}/reactions"
      body: "*"
    };
  }
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse) {
    option (google.api.http) = {
      delete: "/v1/messages/{message_id}/reactions/{emoji}"
    };
  }
  rpc JoinChat(stream JoinChatRequest) returns (stream ChatEvent);
}

message CreatePrivateChatRequest {
  string user_id_1 = 1;
  string user_id_2 = 2;
}

message CreatePrivateChatResponse {
  string chat_id = 1;
}

message CreateGroupChatRequest {
  string title = 1;
  string creator_id = 2;
  repeated string member_ids = 3;
}

message CreateGroupChatResponse {
  string chat_id = 1;
}

message GetChatRequest {
  string chat_id = 1;
}

message GetChatResponse {
  Chat chat = 1;
}

message Chat {
  string id = 1;
  bool is_group = 2;
  string title = 3;
  string photo_url = 4;
  google.protobuf.Timestamp created_at = 5;
}

message AddMemberRequest {
  string user_id = 1;
  string chat_id = 2;
}

message AddMemberResponse {
  bool success = 1;
}

message SendMessageRequest {
  string chat_id = 1;
  string sender_id = 2;
  string text = 3;
  string reply_to_id = 4;
  repeated string attachment_ids = 5;
}

message SendMessageResponse {
  string message_id = 1;
  bool success = 2;
}

message GetMessagesRequest {
  string chat_id = 1;
  int32 limit = 2;
  string cursor_id = 3;
}

message GetMessagesResponse {
  repeated Message messages = 1;
  bool has_more = 2;
}

message EditMessageRequest {
  string message_id = 1;
  string new_text = 2;
}

message EditMessageResponse {
  bool success = 1;
}

message DeleteMessageRequest {
  string message_id = 1;
}

message DeleteMessageResponse {
  bool success = 1;
}

message MarkAsReadRequest {
  string chat_id = 1;
  string user_id = 2;
}

message MarkAsReadResponse {
  bool success = 1;
}

message Attachment {
  string id = 1;
  string message_id = 2;
  string url = 3;
  AttachmentType type = 4;
  string file_name = 5;
  int64 file_size = 6;
}

enum AttachmentType {
  ATTACHMENT_UNSPECIFIED = 0;
  ATTACHMENT_IMAGE = 1;
  ATTACHMENT_VIDEO = 2;
  ATTACHMENT_VOICE = 3;
  ATTACHMENT_FILE = 4;
}

message Message {
  string id = 1;
  string chat_id = 2;
  string sender_id = 3;
  string text = 4;
  string reply_to_id = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp edited_at = 7;
  google.protobuf.Timestamp deleted_at = 8;
  google.protobuf.Timestamp read_at = 9;
  repeated Attachment attachments = 10;
  repeated Reaction reactions = 11;
  bool is_pinned = 12;
}

message Reaction {
  string id = 1;
  string message_id = 2;
  string user_id = 3;
  string emoji = 4;
}

message AddReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string emoji = 3;
}

message RemoveReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string emoji = 3;
}

message AddReactionResponse {
  bool success = 1;
}

message RemoveReactionResponse {
  bool success = 1;
}

message PinMessageRequest {
  string message_id = 1;
  string chat_id = 2;
}

message PinMessageResponse {
  bool success = 1;
}

message JoinChatRequest {
  oneof event {
    TypingEvent typing = 1;
    LeaveChatEvent leave = 2;
  }
}

message ChatEvent {
  oneof event {
    Message message = 1;
    TypingEvent typing = 2;
    MemberEvent member = 3;
  }
}

message TypingEvent {
  string user_id = 1;
  bool is_typing = 2;
}

message LeaveChatEvent {
  string user_id = 1;
}

message MemberEvent {
  string chat_id = 1;
  string user_id = 2;
  bool joined = 3;
}
