services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gav
      POSTGRES_PASSWORD: gav
      POSTGRES_DB: gav
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gav -d gav"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  messenger-migrate:
    image: postgres:15
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: gav
    volumes:
      - ./messenger/migrations:/migrations:ro
    command:
      - sh
      - -c
      - psql -h postgres -U gav -d gav -f /migrations/001_init.sql
    restart: "no"

  social-network:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: social_network
        COMMAND_PATH: ./cmd/api
    environment:
      HTTP_PORT: "8080"
      DB_PATH: /data/social.db
      JWT_SECRET: dev-secret-change-me
      JWT_TTL: 24h
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /uploads
      KAFKA_ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:
      - social-data:/data
      - social-uploads:/uploads

  messenger:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: messenger
        COMMAND_PATH: ./cmd/grpc-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      messenger-migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: postgres://gav:gav@postgres:5432/gav?sslmode=disable
      REDIS_ADDR: redis:6379
      GRPC_ADDR: :9090
      HTTP_ADDR: :8082
      SOCIAL_NETWORK_ADDR: social-network:9000
      KAFKA_ENABLED: "false"
      JWT_SECRET: dev-secret-change-me
    ports:
      - "8082:8082"
      - "9090:9090"

volumes:
  postgres-data:
  social-data:
  social-uploads:
